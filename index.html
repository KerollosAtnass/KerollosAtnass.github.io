    <script type="text/babel">
        const { motion, AnimatePresence } = window.Motion;
        
        // --- 0. Helper Components ---
        
        const Icon = ({ name, className = "" }) => {
            if (!window.feather || !window.feather.icons[name]) return null;
            const svgString = window.feather.icons[name].toSvg({ class: className });
            return <span dangerouslySetInnerHTML={{ __html: svgString }} className={`inline-flex items-center justify-center ${className}`} />;
        };

        const XIcon = ({ className = "" }) => (
            <svg viewBox="0 0 24 24" fill="currentColor" className={className}>
                <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.006 3.75H5.078z"/>
            </svg>
        );

        const DynamicTypewriter = ({ words }) => {
            const [index, setIndex] = React.useState(0);
            const [subIndex, setSubIndex] = React.useState(0);
            const [blink, setBlink] = React.useState(true);
            const [reverse, setReverse] = React.useState(false);

            React.useEffect(() => {
                const timeout2 = setTimeout(() => setBlink((prev) => !prev), 500);
                return () => clearTimeout(timeout2);
            }, [blink]);

            React.useEffect(() => {
                if (!words || words.length === 0 || index >= words.length) return; 
                
                if (subIndex === words[index].length + 1 && !reverse) {
                    const timeout = setTimeout(() => setReverse(true), 2000); 
                    return () => clearTimeout(timeout); 
                }
                
                if (subIndex === 0 && reverse) {
                    setReverse(false);
                    setIndex((prev) => (prev + 1) % words.length); 
                    return;
                }
                
                const timeout = setTimeout(() => {
                    setSubIndex((prev) => prev + (reverse ? -1 : 1));
                }, Math.max(reverse ? 40 : 80, parseInt(Math.random() * 50)));

                return () => clearTimeout(timeout);
            }, [subIndex, index, reverse, words]);

            const currentWord = words[index] || "";

            return (
                <span className="text-white font-normal text-sm md:text-base">
                    {`${currentWord.substring(0, subIndex)}`}
                    <span className={`border-r-2 border-redAccent-100 ml-1 ${blink ? 'opacity-100' : 'opacity-0'}`}> </span>
                </span>
            );
        };

        const AnimatedCounter = ({ endValue }) => {
            const [count, setCount] = React.useState(0);
            
            React.useEffect(() => {
                let start = 0;
                const end = endValue;
                if (start === end) {
                    setCount(end);
                    return;
                }
                
                let totalDuration = 2750; 
                let incrementTime = 30;
                let steps = totalDuration / incrementTime;
                let stepValue = Math.ceil(end / steps);

                let timer = setInterval(() => {
                    start += stepValue;
                    if (start >= end) {
                        setCount(end);
                        clearInterval(timer);
                    } else {
                        setCount(start);
                    }
                }, incrementTime);

                return () => clearInterval(timer);
            }, [endValue]);

            return <span>{count.toLocaleString()}</span>;
        };

        const GitHubContributionGraph = () => {
            const [cells, setCells] = React.useState([]);
            const [isInitialEffect, setIsInitialEffect] = React.useState(true);

            React.useEffect(() => {
                const intervalId = setInterval(() => {
                    const newCells = Array.from({ length: 364 }).map(() => Math.random() > 0.6);
                    setCells(newCells);
                }, 150);

                const timeoutId = setTimeout(() => {
                    clearInterval(intervalId);
                    setIsInitialEffect(false);
                    const finalCells = Array.from({ length: 364 }).map(() => Math.random() > 0.8);
                    setCells(finalCells);
                }, 5000);

                return () => {
                    clearInterval(intervalId);
                    clearTimeout(timeoutId);
                };
            }, []);

            return (
                <div className="w-full overflow-x-auto pb-4 custom-scrollbar">
                    <div className="contribution-grid">
                        {cells.map((isActive, i) => (
                            <div key={i} className={`contribution-cell ${isActive ? 'active' : ''} ${isInitialEffect ? 'transition-none' : ''}`}></div>
                        ))}
                    </div>
                </div>
            );
        };

        // --- 2. Mobile Responsive Navbar Component ---
        const Navbar = ({ currentTab, setCurrentTab }) => {

                    {/* Mobile Dropdown Menu */}

                        {isMobileMenuOpen && (

                                    {tabs.map(tab => (

            const [selectedCert, setSelectedCert] = React.useState(null);

            const [selectedWriteup, setSelectedWriteup] = React.useState(null);
            const [viewAllData, setViewAllData] = React.useState(null);

            // Magic hook to scroll to top smoothly when changing tabs
            React.useEffect(() => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [currentTab]);

            return (

                            {currentTab === 'writeups' && <WriteupsTab key="writeups" setSelectedWriteup={setSelectedWriteup} />}
                            {currentTab === 'links' && <LinksTab key="links" />}
                            {currentTab === 'contact' && <ContactTab key="contact" />}
                        </AnimatePresence>
                    </main>

                    {/* View All Modal */}
                    <AnimatePresence>
                        {viewAllData && (

                                data={viewAllData} 
                                onClose={() => setViewAllData(null)} 
                                onCertClick={(cert) => { setSelectedCert(cert); }}
                                onCourseClick={(course) => { setSelectedCourse(course); }}
                            />
                        )}
                    </AnimatePresence>

                    {/* Modals on top of everything */}
                    <AnimatePresence>
                        {selectedCert && <CertModal cert={selectedCert} onClose={() => setSelectedCert(null)} />}
                    </AnimatePresence>
                    
                    <AnimatePresence>
                        {selectedCourse && <CourseModal course={selectedCourse} onClose={() => setSelectedCourse(null)} />}
                    </AnimatePresence>

                    <AnimatePresence>
                        {selectedWriteup && <WriteupModal writeup={selectedWriteup} onClose={() => setSelectedWriteup(null)} />}
                    </AnimatePresence>

                    <footer className="mt-8 md:mt-12 pt-6 md:pt-8 border-t border-gray-800 text-center text-gray-500 text-xs md:text-sm w-full">
                        <p>© 2026 Kerollos Atnass | Professor Owl. All rights reserved.</p>
                    </footer>

            );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
