        // Advanced Dynamic Typewriter (FIXED CRASH ISSUE)
        const DynamicTypewriter = ({ words }) => {
            const [index, setIndex] = React.useState(0);
            const [subIndex, setSubIndex] = React.useState(0);
            const [blink, setBlink] = React.useState(true);
            const [reverse, setReverse] = React.useState(false);

            React.useEffect(() => {
                const timeout2 = setTimeout(() => setBlink((prev) => !prev), 500);
                return () => clearTimeout(timeout2);
            }, [blink]);

            React.useEffect(() => {
                if (index >= words.length) return; // Safety check
                
                if (subIndex === words[index].length + 1 && !reverse) {
                    const timeout = setTimeout(() => setReverse(true), 2000); 
                    return () => clearTimeout(timeout); // Fix memory leak
                }
                
                if (subIndex === 0 && reverse) {
                    setReverse(false);
                    setIndex((prev) => (prev + 1) % words.length); // Fix crash here (Modulo wrap-around)
                    return;
                }
                
                const timeout = setTimeout(() => {
                    setSubIndex((prev) => prev + (reverse ? -1 : 1));
                }, Math.max(reverse ? 40 : 80, parseInt(Math.random() * 50)));

                return () => clearTimeout(timeout);
            }, [subIndex, index, reverse, words]);

            // Fallback word in case of rapid re-renders
            const currentWord = words[index] || "";

            return (
                <span className="text-white font-normal text-sm md:text-base">
                    {`${currentWord.substring(0, subIndex)}`}
                    <span className={`border-r-2 border-redAccent-100 ml-1 ${blink ? 'opacity-100' : 'opacity-0'}`}>&nbsp;</span>
                </span>
            );
        };

        // Number Counter Animation Component
        const AnimatedCounter = ({ endValue }) => {
            const [count, setCount] = React.useState(0);
            
            React.useEffect(() => {
                let start = 0;
                const end = endValue;
                if (start === end) {
                    setCount(end);
                    return;
                }
                
                let totalDuration = 2750; // User preferred duration
                let incrementTime = 30;
                let steps = totalDuration / incrementTime;
                let stepValue = Math.ceil(end / steps);

                let timer = setInterval(() => {
                    start += stepValue;
                    if (start >= end) {
                        setCount(end);
                        clearInterval(timer);
                    } else {
                        setCount(start);
                    }
                }, incrementTime);

                return () => clearInterval(timer);
            }, [endValue]);

            return <span>{count.toLocaleString()}</span>;
        };

                    const newCells = Array.from({ length: 364 }).map(() => Math.random() > 0.6);
                    setCells(newCells);
                }, 150);

                // Stop effect after 5 seconds and settle down
                const timeoutId = setTimeout(() => {
                    clearInterval(intervalId);
                    setIsInitialEffect(false);
                    // Final static pattern
                    const finalCells = Array.from({ length: 364 }).map(() => Math.random() > 0.8);
                    setCells(finalCells);
                }, 5000);

                return () => {
                    clearInterval(intervalId);
                    clearTimeout(timeoutId);
                };

                        {selectedWriteup && <WriteupModal writeup={selectedWriteup} onClose={() => setSelectedWriteup(null)} />}
                    </AnimatePresence>

                    <footer className="mt-12 pt-8 border-t border-gray-800 text-center text-gray-500">
                        <p>© 2026 Kerollos Atnass | Professor Owl. All rights reserved.</p>
                    </footer>
                </div>
            );
        };
        
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
